id: auth-forgot-password-001
title: User requests a password reset link
role: employee
priority: P1
related_pages:
  - auth/03-forgot-password.html
acceptance_criteria:
  - id: AC-1
    given: an unauthenticated user is on /forgot-password
    when: they submit a registered email address
    then: a success screen is shown saying "If the address exists, we've sent a reset link"
  - id: AC-2
    given: the user submits a non-registered email
    when: form is submitted
    then: same generic success message is shown (no email enumeration)
  - id: AC-3
    given: the form is rendered
    when: the user submits with an empty or invalid email
    then: inline validation prevents submission
  - id: AC-4
    given: a reset request succeeded
    when: the user clicks "Back to login"
    then: they are navigated to /login
boundary_cases:
  - Email with mixed case is lowercased before lookup
  - Submitting twice within 30s hits rate limit (429)
  - Link contains single-use token that expires after 30 minutes
error_scenarios:
  - Mail service unavailable -> success shown to user but event logged server-side
  - Network failure -> toast with retry option
  - Rate-limit (429) -> message "Please wait a moment before trying again"
