id: employee-change-password-001
title: Employee changes their own password
role: employee
priority: P1
related_pages:
  - employee/55-change-password.html
  - employee/18-profile.html
acceptance_criteria:
  - id: AC-1
    given: an authenticated employee is on /employee/profile/change-password
    when: they enter current password, new password, confirm password (matching) and submit
    then: password is updated, user is signed out, and redirected to /login with success toast
  - id: AC-2
    given: the form is open
    when: new and confirm don't match
    then: inline validation blocks submission
  - id: AC-3
    given: the form is open
    when: new password is shorter than 8 characters
    then: inline validation blocks submission
  - id: AC-4
    given: the form is open
    when: the current password is wrong
    then: server returns 401, UI shows "Current password is incorrect"
boundary_cases:
  - Exactly 8-char new password accepted
  - New password equal to old is rejected with "New password must differ"
  - Password contains only spaces rejected
error_scenarios:
  - Server 500 -> toast + form preserved
  - Session expired mid-flow -> redirect to /login
  - Rate limit after multiple wrong attempts -> message with cooldown
