id: auth-reset-password-001
title: User resets password via emailed token
role: employee
priority: P1
related_pages:
  - auth/04-reset-password.html
acceptance_criteria:
  - id: AC-1
    given: the user visits /reset-password?token=<valid-token>
    when: they enter a new password and matching confirmation and submit
    then: success message is shown and user is redirected to /login
  - id: AC-2
    given: the form is rendered
    when: new-password and confirm-password do not match
    then: inline error "Passwords must match" is shown
  - id: AC-3
    given: the form is rendered
    when: new password is shorter than 8 chars
    then: inline error "Minimum 8 characters" is shown
  - id: AC-4
    given: the token in URL is missing or invalid
    when: the page loads
    then: an error banner is shown with a link to /forgot-password
boundary_cases:
  - Exactly 8-character password is accepted
  - Password with unicode chars accepted and hashed correctly
  - Token used once becomes invalid for a second attempt
error_scenarios:
  - Expired token -> message "This link has expired" with link to request a new one
  - Malformed token -> same as expired
  - Server 500 -> generic error toast, form values preserved
